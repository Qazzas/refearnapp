services:
  app:
    build:
      context: .
      args:
        # These pull from your .env.nextjs file to "bake" into the build
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
        - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    ports:
      - "3000:3000"
    env_file:
      - .env.nextjs # This loads ALL secrets (Stripe, Google, etc.) at runtime
    restart: always