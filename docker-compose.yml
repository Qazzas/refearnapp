version: '3.8'

services:
  dashboard:
    build:
      context: .
      target: runner
      args:
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
        - NEXT_PUBLIC_SELF_HOSTED=${NEXT_PUBLIC_SELF_HOSTED}
        - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
        - NEXT_PUBLIC_CNAME_TARGET=${NEXT_PUBLIC_CNAME_TARGET}
    ports:
      - "3000:3000"
    # Keep env_file for RUNTIME secrets (DATABASE_URL, etc.)
    env_file: .env
    restart: always