name: Database Operations

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/src/db/schema.ts'  # Updated path
      - 'apps/dashboard/migrations/**'     # Updated path

  workflow_dispatch:
    inputs:
      target:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  database-tasks:
    runs-on: ubuntu-latest
    # This line tells GitHub to run all 'run' commands inside the dashboard folder
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        # Bun is smart enough to find the root pnpm-lock.yaml or local package.json
        run: bun install

      - name: Auto Migrate Schema
        env:
          SUPABASE_DATABASE_URL: ${{ (github.ref == 'refs/heads/main' || github.event.inputs.target == 'prod') && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
        run: bun run db:migrate

      - name: Manual Reset and Seed
        if: github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_DATABASE_URL: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_REDIS_URL || secrets.DEV_REDIS_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_REDIS_TOKEN || secrets.DEV_REDIS_TOKEN }}
          CURRENCY_API_KEY: ${{ secrets.CURRENCY_API_KEY }}
          MODE: ${{ github.event.inputs.target }}
        run: |
          echo "🚀 Starting Reset and Seed sequence for ${{ github.event.inputs.target }}..."
          bun src/db/reset.ts
          bun src/db/seeds/seedFun1.ts
          echo "✅ Database operation successful."