name: Database Operations

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/src/db/schema.ts'  # Updated path
      - 'apps/dashboard/migrations/**'     # Updated path

  workflow_dispatch:
    inputs:
      target:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  database-tasks:
    runs-on: ubuntu-latest
    # ❌ REMOVE the 'defaults' block here. We want to control where we run things.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        # ✅ Run this at the ROOT (no cd) so workspaces resolve correctly
        run: bun install

      - name: Auto Migrate Schema
        env:
          DATABASE_URL: ${{ (github.ref == 'refs/heads/main' || github.event.inputs.target == 'prod') && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
        # ✅ Navigate into the app folder ONLY for the command
        run: cd apps/dashboard && bun run db:migrate

      - name: Manual Reset and Seed
        if: github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_REDIS_URL || secrets.DEV_REDIS_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ (github.event.inputs.target == 'prod') && secrets.PROD_REDIS_TOKEN || secrets.DEV_REDIS_TOKEN }}
          CURRENCY_API_KEY: ${{ secrets.CURRENCY_API_KEY }}
          MODE: ${{ github.event.inputs.target }}
        # ✅ Navigate into the app folder for scripts too
        run: |
          cd apps/dashboard
          echo "🚀 Starting Reset and Seed sequence..."
          bun src/db/reset.ts
          bun src/db/seeds/seedFun1.ts
          echo "✅ Database operation successful."